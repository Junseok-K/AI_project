<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Landing Pages</title>
    <style>
      :root {
        font-family:
          Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR",
          sans-serif;
        color: #191f28;
        background: #f5f7fb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100svh;
        padding: 64px 24px;
      }

      main {
        width: min(760px, 100%);
        margin: 0 auto;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 42px;
        line-height: 1.14;
      }

      p {
        margin: 0;
        color: #6b7684;
        font-size: 18px;
        line-height: 1.7;
      }

      .template-list {
        display: grid;
        gap: 14px;
        margin-top: 36px;
      }

      .template-link {
        display: block;
        padding: 24px;
        border: 1px solid #e5e8eb;
        border-radius: 8px;
        background: #ffffff;
        color: inherit;
        text-decoration: none;
        box-shadow: 0 14px 40px rgba(49, 57, 74, 0.08);
      }

      .template-link:hover {
        border-color: #1168ff;
      }

      .template-link strong {
        display: block;
        margin-bottom: 8px;
        font-size: 22px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Landing Pages</h1>
      <p>독립 서버에서 확인할 랜딩페이지 템플릿 목록입니다.</p>

      <div class="template-list">
        <a class="template-link" href="./toss-inspired-finance/">
          <strong>Toss Inspired Finance</strong>
          <span>금융 서비스용 랜딩페이지 템플릿</span>
        </a>
      </div>
    </main>
  </body>
</html>
