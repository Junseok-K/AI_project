services:
  app:
    build: .
    depends_on:
      - postgres
      - redis
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/ai_news
      DB_USERNAME: ai_news
      DB_PASSWORD: ai_news
      REDIS_HOST: redis
      NAVER_CLIENT_ID: ${NAVER_CLIENT_ID}
      NAVER_CLIENT_SECRET: ${NAVER_CLIENT_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID}
      KAKAO_REDIRECT_URI: ${KAKAO_REDIRECT_URI:-http://localhost:8080/oauth/kakao/callback}
    restart: unless-stopped

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ai_news
      POSTGRES_USER: ai_news
      POSTGRES_PASSWORD: ai_news
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  postgres-data:
